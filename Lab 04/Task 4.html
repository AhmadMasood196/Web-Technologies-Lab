<!DOCTYPE html>
<html>
<head>
<title>Student Result</title>
</head>
<body>

<h2>Student Result Calculator</h2>

<label>Subject 1 Marks:</label>
<input type="number" id="s1"><br><br>

<label>Subject 2 Marks:</label>
<input type="number" id="s2"><br><br>

<label>Subject 3 Marks:</label>
<input type="number" id="s3"><br><br>

<button onclick="calculate()">Calculate Result</button>

<h3 id="result"></h3>

<script>

function calculate(){

let m1 = Number(document.getElementById("s1").value);
let m2 = Number(document.getElementById("s2").value);
let m3 = Number(document.getElementById("s3").value);

let total = m1 + m2 + m3;

let percentage = (total / 300) * 100;

let grade;

if(percentage >= 80){
grade = "A";
}
else if(percentage >= 70){
grade = "B";
}
else if(percentage >= 60){
grade = "C";
}
else if(percentage >= 50){
grade = "D";
}
else{
grade = "Fail";
}

document.getElementById("result").innerHTML =
"Total = " + total +
"<br>Percentage = " + percentage + "%" +
"<br>Grade = " + grade;

}

</script>

</body>
</html>
