<!DOCTYPE html>
<html>
<head>
<title>ATM System</title>
</head>
<body>

<h2>ATM Withdrawal</h2>

<p>Current Balance: <span id="balance">5000</span></p>

<label>Enter Withdrawal Amount:</label>
<input type="number" id="withdraw"><br><br>

<button onclick="withdrawMoney()">Withdraw</button>

<h3 id="message"></h3>

<script>

let balance = 5000;

function withdrawMoney(){

let amount = Number(document.getElementById("withdraw").value);

if(amount > balance){

document.getElementById("message").innerHTML = "Insufficient Balance";

}
else{

balance = balance - amount;

document.getElementById("balance").innerHTML = balance;

document.getElementById("message").innerHTML =
"Withdrawal Successful. Remaining Balance = " + balance;

}

}

</script>

</body>
</html>
