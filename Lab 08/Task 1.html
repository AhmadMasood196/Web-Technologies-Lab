<!DOCTYPE html>
<html>
<head>
<title>Student Form</title>
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>

<body ng-app="">
<h2>Student Information</h2>

Name: <input type="text" ng-model="name"><br><br>
Roll No: <input type="text" ng-model="roll"><br><br>
Department: <input type="text" ng-model="dept"><br><br>

<h3>Output:</h3>
<p>Name: {{name}}</p>
<p>Roll No: {{roll}}</p>
<p>Department: {{dept}}</p>

</body>
</html>
