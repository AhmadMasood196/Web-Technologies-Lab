<!DOCTYPE html>
<html>
<head>
<title>Login Form</title>

<style>

body{
font-family: Arial;
background: linear-gradient(120deg,#09181a,#4990f3);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:rgb(91, 140, 247);
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#4CAF50;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

</style>
</head>

<body>

<div class="container">

<h2>Login Form</h2>

<form id="loginForm">

<input type="email" id="email" placeholder="Enter Email">

<input type="password" id="password" placeholder="Enter Password">

<button type="submit">Login</button>

</form>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault();

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

if(email===""||password===""){
alert("All fields are required!");
return;
}

if(password.length<6){
alert("Password must be at least 6 characters");
return;
}

alert("Login Successful");

});

</script>

</body>
</html>
